{% extends 'base.html' %}
{% block content %}
<div class="col-md-6 mx-auto card p-4 shadow-sm border-0">
    <h3 class="mb-4 text-center">Update Password</h3>
    
    <div id="alert-container"></div>
    
    <form id="update-password-form">
        <div class="mb-3 position-relative">
            <label>Old Password:</label>
            <div class="input-group">
                <input type="password" id="old_password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('old_password', this)">👁️</button>
            </div>
        </div>
        
        <div class="mb-3 position-relative">
            <label>New Password:</label>
            <div class="input-group">
                <input type="password" id="new_password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('new_password', this)">👁️</button>
            </div>
            <small class="text-muted d-block mt-1">Must be 8+ chars and include uppercase, lowercase, digit, and special char.</small>
        </div>

        <div class="mb-4 position-relative">
            <label>Confirm New Password:</label>
            <div class="input-group">
                <input type="password" id="confirm_password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirm_password', this)">👁️</button>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary w-100" id="submit-btn">Update Password</button>
    </form>
</div>

<script>
document.getElementById('update-password-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const alertContainer = document.getElementById('alert-container');
    const submitBtn = document.getElementById('submit-btn');
    
    const old_password = document.getElementById('old_password').value;
    const new_password = document.getElementById('new_password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'Updating...';
    
    try {
        const response = await fetch('/update-password', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                old_password: old_password,
                new_password: new_password,
                confirm_password: confirm_password
            })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            alertContainer.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
            document.getElementById('update-password-form').reset();
            // Optional: redirect after success
            // setTimeout(() => window.location.href = '/dashboard', 2000);
        } else {
            // Display error messages from FastAPI
            let errorMsg = data.detail || 'An error occurred while updating the password.';
            if (Array.isArray(data.detail)) {
                errorMsg = data.detail[0].msg;
            }
            alertContainer.innerHTML = `<div class="alert alert-danger">${errorMsg}</div>`;
        }
    } catch (err) {
        alertContainer.innerHTML = `<div class="alert alert-danger">Network error. Please try again later.</div>`;
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Update Password';
    }
});
</script>
{% endblock %}
